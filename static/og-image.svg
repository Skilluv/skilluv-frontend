<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="ogg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="bggrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bggrad)"/>
  <!-- Decorative diamonds -->
  <path d="M1050 100 L1120 170 L1050 240 L980 170 Z" fill="none" stroke="#ea580c" stroke-width="2" opacity="0.15"/>
  <path d="M1000 300 L1100 400 L1000 500 L900 400 Z" fill="none" stroke="#ea580c" stroke-width="2" opacity="0.1"/>
  <path d="M150 450 L200 500 L150 550 L100 500 Z" fill="none" stroke="#ea580c" stroke-width="2" opacity="0.1"/>
  <!-- Fragment icon -->
  <path d="M100 280 L140 240 L180 280 L140 320 Z" fill="url(#ogg)" opacity="0.9"/>
  <!-- "Skilluv" -->
  <text x="200" y="310" font-family="'Space Grotesk', Arial, sans-serif" font-size="72" font-weight="700">
    <tspan fill="url(#ogg)">Skill</tspan><tspan fill="#fafaf9">uv</tspan>
  </text>
  <!-- Tagline -->
  <text x="100" y="400" font-family="'Space Grotesk', Arial, sans-serif" font-size="32" font-weight="500" fill="#a8a29e">
    Prouve ce que tu sais faire. Pour de vrai.
  </text>
  <!-- Stats bar -->
  <rect x="100" y="460" width="200" height="4" rx="2" fill="#ea580c" opacity="0.6"/>
  <rect x="320" y="460" width="150" height="4" rx="2" fill="#2563eb" opacity="0.6"/>
  <rect x="490" y="460" width="100" height="4" rx="2" fill="#22c55e" opacity="0.6"/>
  <text x="100" y="510" font-family="'Space Grotesk', Arial, sans-serif" font-size="20" fill="#a8a29e">
    Code · Design · Game · Security
  </text>
</svg>
