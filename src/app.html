<!doctype html>
<html lang="fr">
	<head>
		<script>
			(function() {
				if (localStorage.getItem('skilluv-terminal-mode') === 'true') {
					var s = document.createElement('style');
					s.id = 'term-hide';
					s.textContent = 'html,body{background:#000!important}#app{visibility:hidden}';
					document.head.appendChild(s);
					return;
				}
				var b = localStorage.getItem('skilluv-theme') || 'forge';
				var m = localStorage.getItem('skilluv-mode') || 'dark';
				document.documentElement.setAttribute('data-theme', m === 'dark' ? b : b + '-light');
			})();
		</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Skilluv — Prouve ce que tu sais faire. Pour de vrai." />
		<meta name="theme-color" content="#ea580c" />
		<meta property="og:site_name" content="Skilluv" />
		<meta property="og:type" content="website" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.png" />
		%sveltekit.head%
	</head>
	<body>
		<div id="app">%sveltekit.body%</div>
	</body>
</html>
