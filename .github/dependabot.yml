# Dependabot config — Skilluv frontend (SvelteKit).
# Groups minor + patch to avoid PR noise; majors get their own PR for review.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels: [dependencies, npm]
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      svelte-ecosystem:
        patterns:
          - "@sveltejs/*"
          - "svelte*"
          - "@tailwindcss/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, github-actions]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]
